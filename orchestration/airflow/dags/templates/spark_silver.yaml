# SparkKubernetesOperator Jinja 模板（.yaml 在 template_ext 內，runtime 渲染）。
# 兩模式：hourly（無 start_hour param → 用時間錨）；reprocess（params.start_hour/end_hour）。
#
# ⚠️ 時間錨必須鏡射 _yt_common.resolve_run_anchor：(data_interval_start or logical_date or dag_run.run_after)。
# Airflow 3.x bare `dags trigger`（手動 run）data_interval_start 與 logical_date 皆 None，直接
# data_interval_start.strftime() 會 render 爆（None.strftime）→ spark task 每 try 秒掛、4 try 耗盡→failed
# （實測：所有 manual run ld=None、spark failed try=4；scheduled run ld 正常、spark success）。ingest/
# delete_stale/load 都走 resolve_run_anchor 退 run_after，spark 模板漏套就會時間錨不一致——名字/‑‑hour
# 對不上 ingest 寫的 bronze 小時、load 掃空。故此處三個 strftime 全走同一 fallback，跨 task 對齊整點。
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  {%- if params.start_hour is defined and params.start_hour %}
  name: yt-silver-rp-{{ ts_nodash | lower }}
  {%- else %}
  name: yt-silver-{{ (data_interval_start or logical_date or dag_run.run_after).strftime('%Y%m%d%H') }}
  {%- endif %}
  namespace: data
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "{{ params.spark_image }}"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/jobs/silver_job.py
  arguments:
  {%- if params.start_hour is defined and params.start_hour %}
    - --start-hour
    - "{{ params.start_hour }}"
    - --end-hour
    - "{{ params.end_hour }}"
  {%- else %}
    - --date
    - "{{ (data_interval_start or logical_date or dag_run.run_after).strftime('%Y-%m-%d') }}"
    - --hour
    - "{{ (data_interval_start or logical_date or dag_run.run_after).strftime('%H') }}"
  {%- endif %}
  sparkVersion: "4.0.2"
  restartPolicy:
    type: Never          # 重試由 Airflow task 層負責，不雙層重試
  timeToLiveSeconds: 3600
  sparkConf:
    # Iceberg JDBC catalog（§4 合約；catalog 名 lakehouse）
    spark.sql.catalog.lakehouse: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.lakehouse.type: jdbc
    spark.sql.catalog.lakehouse.uri: jdbc:postgresql://lakehouse-postgres.data.svc:5432/lakehouse
    spark.sql.catalog.lakehouse.jdbc.user: pipeline_writer
    spark.sql.catalog.lakehouse.jdbc.password: "{{ params.pg_password }}"
    spark.sql.catalog.lakehouse.warehouse: s3a://silver/warehouse
    spark.sql.defaultCatalog: lakehouse
    # S3A → MinIO（憑證走 env，見 envFrom）
    spark.hadoop.fs.s3a.endpoint: http://lakehouse-minio.data.svc:9000
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    # AWS SDK v2 provider（配 hadoop-aws 3.4.1 的 v2 bundle）——v1 的 com.amazonaws.auth.* 換 bundle 後不存在；
    # 讀同一組 AWS_ACCESS_KEY_ID/SECRET env（minio-root secret via envFrom）。
    spark.hadoop.fs.s3a.aws.credentials.provider: software.amazon.awssdk.auth.credentials.EnvironmentVariableCredentialsProvider
    spark.sql.session.timeZone: UTC
  # 記憶體姿態：driver+executor 各 1536m。曾試縮到 1024/768 想省記憶體，反而讓 spark 一次都跑不出
  # silver（Spark 4.0 JVM + Iceberg planning + hadoop-aws S3A buffer 的 baseline 撐不住 → 真 OOM）。
  # 實測根因不在 spark 自身大小，而在「16GB M4 控制平面延遲」：apiserver PUT 逾時 → spark-operator
  # leader-election lease 掉租停 reconcile → SparkApplication 沒建 driver／沒標 COMPLETED → Airflow
  # up_for_retry。正解是「關非必要服務（monitoring/ArgoCD/hello）騰記憶體給 apiserver/etcd」，
  # 而非餓死管線 job（同 dbt：是把 limit 加到 1Gi 消 OOM，不是縮）。故維持 1536m 不縮。
  driver:
    cores: 1
    memory: 1536m
    serviceAccount: spark-operator-spark
    envFrom:
      - secretRef: {name: minio-root}
  executor:
    instances: 1
    cores: 1
    memory: 1536m
    serviceAccount: spark-operator-spark
    envFrom:
      - secretRef: {name: minio-root}
