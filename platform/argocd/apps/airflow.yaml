apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.22.0
    helm:
      valuesObject:
        executor: KubernetesExecutor
        postgresql:
          enabled: false # metadata 走共用 Postgres 的 airflow db（一套 Postgres 紀律）
        data:
          metadataSecretName: lakehouse-postgres # chart 約定 key 名 connection（§8）。必須在 data: 下——top-level metadataSecretName 會被 chart 靜默忽略而 fallback 內建 postgresql（airflow-postgresql.airflow，本專案未部署→DNS 解不出→migrate/init 全炸）
        webserverSecretKeySecretName: airflow-webserver-secret
        images:
          airflow:
            repository: ghcr.io/ferguske/trend-intelligence-platform/airflow
            tag: sha-edc68f0 # 佔位；airflow-ci bump
        dags:
          gitSync:
            enabled: true
            repo: https://github.com/fergusKe/trend-intelligence-platform
            branch: main
            subPath: orchestration/airflow/dags
            resources:
              requests: {cpu: 10m, memory: 64Mi}
              limits: {cpu: 50m, memory: 128Mi}
        ingress:
          apiServer:
            enabled: true
            ingressClassName: nginx
            hosts:
              - name: airflow.localtest.me
        statsd:
          enabled: true
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
        secret:
          - envName: YOUTUBE_API_KEY
            secretName: youtube-api
            secretKey: YOUTUBE_API_KEY
          - envName: AWS_ACCESS_KEY_ID
            secretName: minio-root
            secretKey: AWS_ACCESS_KEY_ID
          - envName: AWS_SECRET_ACCESS_KEY
            secretName: minio-root
            secretKey: AWS_SECRET_ACCESS_KEY
          - envName: LAKEHOUSE_PG_DSN
            secretName: lakehouse-postgres
            secretKey: pipeline-dsn
        scheduler:
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
        dagProcessor:
          resources:
            requests: {cpu: 200m, memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
        apiServer:
          resources:
            requests: {cpu: 200m, memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
        triggerer:
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
        workers:
          resources: # KubernetesExecutor ephemeral task pod（含 ingest ×8）
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 512Mi}
        createUserJob:
          useHelmHooks: false
          applyCustomEnv: false
          jobAnnotations: # ArgoCD 官方建議姿態：Job.spec.template 不可變，plain resource 遇 spec 變（image bump）ArgoCD patch 撞 immutable→SyncFailed 死鎖。設 Sync hook 令 ArgoCD 每次 sync 刪舊建新，繞開 immutable
            "argocd.argoproj.io/hook": Sync
            "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
        migrateDatabaseJob:
          useHelmHooks: false
          applyCustomEnv: false
          jobAnnotations: # 同上；migrate 走 Sync hook＝每次 sync 冪等重跑 airflow db migrate（image bump 帶新 migration 時正確套用）
            "argocd.argoproj.io/hook": Sync
            "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
    retry: {limit: 10, backoff: {duration: 15s, factor: 2, maxDuration: 3m}}
