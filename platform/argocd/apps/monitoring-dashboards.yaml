apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/fergusKe/trend-intelligence-platform
    targetRevision: main
    path: platform/monitoring/dashboards
    # 不寫 directory.recurse——false 是預設值，ArgoCD 會把預設值欄位正規化剝掉，
    # 寫了反而讓 root app 永久 OutOfSync（selfHeal 無限打架，generation 暴增）
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
    retry: {limit: 10, backoff: {duration: 15s, factor: 2, maxDuration: 3m}}
