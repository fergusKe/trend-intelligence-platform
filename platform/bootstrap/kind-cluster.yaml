# 單節點叢集（2026-07-17 由 3 節點瘦身）：16GB M4 上三節點是奢侈——每個 worker 多一份
# kubelet/containerd/kube-proxy/CNI + 系統 pod（~0.5–1GiB/節點），且跨節點 watch 流量會加劇
# apiserver 延遲 → spark-operator/KubernetesExecutor 掉租漏事件 → 管線 task 假性 up_for_retry。
# 單節點把全部 workload 收在一個 kubelet 下、kubelet→apiserver 走本地，控制平面壓力大降；
# kind 對單節點會自動移除 control-plane 的 NoSchedule taint，一般 workload 照樣排得上。
# k8s+GitOps+全套 operator 展示完全不受影響（多節點調度只是 nice-to-have，非 portfolio 必需）。
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: trend-platform
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    labels:
      ingress-ready: "true"          # ingress-nginx nodeSelector 對準這個
    extraPortMappings:
      - containerPort: 80
        hostPort: 80                  # 本機 80 被佔時改 8080，其餘不動
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 8443                # M4 host 的 443 被 Tailscale 佔用，避開；P0 驗收全走 HTTP 不受影響
        listenAddress: "127.0.0.1"
        protocol: TCP
