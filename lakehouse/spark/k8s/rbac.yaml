# airflow ns 的 worker SA 對 data ns 的權限：SparkApplication CRUD + KPO 的 pod 生命週期 + log 讀
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pipeline-runner
  namespace: data
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]   # KubernetesPodOperator（dbt pod）需要
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    # KubernetesPodOperator（dbt_run/dbt_test）await_pod_start → watch_pod_events 會 list data ns 的
    # events 回報 pod 排程進度；缺此權限則 dbt pod 還在 ContainerCreating 時 KPO 就撞 403 Forbidden
    # （"events is forbidden: ... cannot list resource events in namespace data"）→ task failed。
    # dbt pod 本體其實會成功（實測 dbt run PASS=7），純粹卡在 operator 這層的 events 讀取權限。
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-pipeline-runner
  namespace: data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-pipeline-runner
subjects:
  - kind: ServiceAccount
    name: airflow-worker      # chart 預設 <release>-worker；Task 0 C5 校驗、Task 15 live 複核
    namespace: airflow
